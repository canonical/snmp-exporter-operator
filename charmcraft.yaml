name: snmp-exporter
type: charm
summary: Prometheus compatible SNMP exporter.
description: |
  This machine charm deploys and manages the Prometheus SNMP Exporter, enabling
  Prometheus-compatible monitoring of network devices and infrastructure that
  speak SNMP. It is a complementary charm to the Canonical Observability Stack
  (COS). Learn more about COS at https://documentation.ubuntu.com/observability.

  The SNMP Exporter translates SNMP data into Prometheus metrics, allowing you to
  monitor routers, switches, servers, and other SNMP-enabled devices through COS
  without requiring those devices to expose a native metrics endpoint.

  Key features:

    - Collects SNMP data from network devices and exposes it as Prometheus
      metrics via an OpenMetrics endpoint.
    - Simple target configuration through a comma-separated list of hostnames or
      IP addresses via Juju config.
    - Support for custom SNMP configuration files generated by the upstream
      snmp_exporter generator tool, enabling monitoring of any SNMP MIB.
    - Custom Prometheus scrape configuration for advanced setups requiring
      fine-grained control over scrape jobs.
    - Integration with COS via the cos-agent relation, forwarding metrics
      through Grafana Agent to Prometheus.

links:
  documentation: https://documentation.ubuntu.com/observability/latest/
  website: https://charmhub.io/snmp-exporter
  source: https://github.com/canonical/snmp-exporter-operator
  issues: https://github.com/canonical/snmp-exporter-operator/issues


platforms:
  ubuntu@22.04:amd64:
  ubuntu@24.04:amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]
    override-build: |
      craftctl default
      git describe --always > $CRAFT_PART_INSTALL/version

provides:
  cos-agent:
    interface: cos_agent
    optional: true
    limit: 1

config:
  options:
    targets:
      default: ""
      type: string
      description: |
          Comma separated list of targets to scrape
    config_file:
      type: string
      default: ""
      description: >
        Custom SNMP configuration file (yaml).
        To send the contents of a file to this configuration option, the symbol `@` must be used.

        Usage: juju config snmp-exporter config_file=@snmp.yaml

        The content of this file should not be manually created or edited by user. 
        For reference on how to generate config file, please refer to:
        https://github.com/prometheus/snmp_exporter/tree/main/generator
    scrape_config_file:
      type: string
      default: ""
      description: >
        Custom Prometheus scrape config file (yaml).

        To send the contents of a file to this configuration option, the symbol `@` must be used.

        Usage: juju config snmp-exporter scrape_config_file=@scrape_config.yaml

        For reference on how to format the Prometheus config file, please refer to:
        https://github.com/prometheus/snmp_exporter?tab=readme-ov-file#prometheus-configuration
